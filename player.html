<!doctype html>
<html>  <head>   <meta charset="utf-8">   <meta property="og:site_name" content="Music"/>   <meta property="og:title" content="Musics"/>   <meta name="theme-color" content="#ccfadb"/>    <meta equiv="content-type:text/html"/>   <link rel="shortcut icon" href=""/>   <!--<base href="" id="c"/><base target="_self" />-->    <title>Sounds</title>  </head>  <body>  <div align="center">  <video src="" id="displays" controls loop="true" currentTime="0" width="400" height="320" align="center" onclick="all"></video>  </div>   <div class="controls_block" align="center">   <input type="text" id="loops" value="true">   <button onclick="loopStart()" >循环设置</button>   <br>   <input type="number" id="startTimes" value="0">   <button onclick="startTimes()" >开始时间</button>   <br>   <input type="number" id="speed"  value="1.0">   <button onclick="speed()" >播放速度</button>   <br>   <input type="text" id="path"  value="">   <button onclick="srcSet()" >路径&nbsp;&nbsp;</button>   <br>   <input type="number" id="sounds"  value="1">   <button onclick="sound()" >音量</button>   <br>   <div>    <button onclick="play();displays.play();" id="playbutton" >播放</button>    <button onclick="pause();displays.pause();" id="pausebutton" style="display:none;">暂停</button>   </div>  </div>  <div style="display: flex;flex-wrap: wrap;align-content: center;display:none; /*不换行*/" >   <div >None</div>   <div >None</div>   <div >None</div>   <div >None</div>  </div>  </body>
</html>
<style>
button{  width:80px;  height:36px;  background:#cfbdea;  border:6px solid #defad1;  border-radius:0px;
}
input{  width:250px;  height:30px;  border:5px solid #000000;  margin:2px;  background:#feacfe;
}
input:hover{  border:2px solid #ccffff;  background:#ffffae  height:30px;  margin:6px 0px 6px 0px; 
}
button:hover{  background:white;  border:2px solid #ccccff;  margin:8px;  background:#8a2be2;
}
#pausebutton , #playbutton{  width:200px;  height:100px;  font-size:50px;  font-weight:0;
}
#pausebutton{  color:red;
}
#playbutton{  color:lightgreen;
}
</style>
<script> 
function loopStart(){  document.getElementById('displays').loop=document.getElementById('loops').value;
}
function startTimes(){  document.getElementById('displays').currentTime=document.getElementById('startTimes').value;
}
function speed() {  var playSpeed=document.getElementById('speed').value;  var speedSetting=document.getElementById('displays');  speedSetting.playbackRate=playSpeed;
}     function play(){   var displays=document.getElementById("displays");   document.getElementById('playbutton').style="display:none;";   document.getElementById('pausebutton').style="display:block;";  } 
function pause(){   var displays=document.getElementById("displays");   document.getElementById('pausebutton').style="display:none;";   document.getElementById('playbutton').style="display:block;";
}
function srcSet() {   document.getElementById('displays').src=document.getElementById('path').value;
}
function sound() {   var sound=document.getElementById('displays');   var soundSize=document.getElementById('sounds').value;   sound.volume=soundSize;  }
</script>
